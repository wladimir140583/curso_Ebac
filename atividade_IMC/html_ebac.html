<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de IMC</title>

    <link rel="stylesheet" href="css/css_ebac.css">

</head>
<body>

    <div><h1>Calculadora de IMC</h1></div>

<!--Dois campos de input: um para peso e 
    outro para a altura.-->

<div>
    <label for="peso">Digite seu Peso: </label>
        <input type="number" id="peso"/>
</div>

<br> 

<div> 
    <label for="altura">Digite sua Altura:</label>
        <input type="number" id="altura" step="0.01" placeholder="Ex: 1.75"/>
</div>
<br>

<!--Botão com o texto "Calcular".-->
<div><button id="btCalcular">Calcular</button></div>

<!-- Saída dos Resultados -->
<div>
    <p id="imc"></p>
    <p id="outClassificacaoIMC"></p>
</div>

<script src="js/ebac.js"></script>

</body>
</html>
